global:
  scrape_interval:     15s
  scrape_timeout:      10s
  evaluation_interval: 15s
  external_labels:
    monitor:     "sentiment-mlops"
    environment: "production"

rule_files:
  - "/etc/prometheus/alerts/*.yml"
  - "/etc/prometheus/alerts/*.yaml"
scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"
          component: "monitoring"

  - job_name: "sentiment_backend"
    scrape_interval: 10s        
    scrape_timeout:  8s
    metrics_path:    "/metrics"
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service:   "sentiment-api"
          component: "backend"
          language:  "python"
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "sentiment_.*"
        action: keep              

  - job_name: "alertmanager"
    scrape_interval: 15s
    static_configs:
      - targets: ["alertmanager:9093"]
        labels:
          service:   "alertmanager"
          component: "monitoring"


