name: sentiment-analysis

services:

  backend:
    image: sentiment-analysis-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentiment_backend
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      - MODEL_NAME=${MODEL_NAME:-sentiment_classifier}
      - MODEL_STAGE=${MODEL_STAGE:-Staging}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - mlflow_data:/mlflow:ro
    depends_on:
      - mlflow
    networks:
      - sentiment_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentiment_frontend
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - sentiment_net
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: sentiment_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --workers 1
    networks:
      - sentiment_net
    restart: unless-stopped

  postgres:
    image: postgres:13
    container_name: sentiment_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-airflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-airflow}
      - POSTGRES_DB=${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentiment_net
    restart: unless-stopped

  airflow:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: sentiment_airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres:5432/${POSTGRES_DB:-airflow}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-sentiment_secret_key_2024}
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT=300
      - AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT=300
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        set -e;
        airflow db migrate;
        airflow dags unpause sentiment_data_pipeline || true;
        airflow users create --username ${AIRFLOW_ADMIN_USERNAME:-admin} --password ${AIRFLOW_ADMIN_PASSWORD:-admin} --firstname ${AIRFLOW_ADMIN_FIRSTNAME:-Admin} --lastname ${AIRFLOW_ADMIN_LASTNAME:-User} --role Admin --email ${AIRFLOW_ADMIN_EMAIL:-admin@sentiment.com} || true;
        airflow webserver --port 8080 --workers 1 &
        exec airflow scheduler
      "
    networks:
      - sentiment_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: sentiment_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts:/etc/prometheus/alerts
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - sentiment_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.1
    container_name: sentiment_grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/dashboard.json:/var/lib/grafana/dashboards/sentiment-dashboard.json:ro
    depends_on:
      - prometheus
    networks:
      - sentiment_net
    restart: unless-stopped
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sentiment_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    environment:
      - SMTP_SMARTHOST=${SMTP_SMARTHOST:-sandbox.smtp.mailtrap.io:587}
      - SMTP_FROM=${SMTP_FROM:-alerts@sentiment-mlops.dev}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-ma24c051@smail.iitm.ac.in}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    networks:
      - sentiment_net
    restart: unless-stopped

  trainer:
    build:
      context: .
      dockerfile: training/Dockerfile
    container_name: sentiment_trainer
    environment:
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI:-http://mlflow:5000}
      - MODEL_NAME=${MODEL_NAME:-sentiment_classifier}
      - MODEL_STAGE=${MODEL_STAGE:-Staging}
      - PYTHONPATH=/app
      - NLTK_DATA=/usr/local/share/nltk_data
      - HOME=/tmp
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - mlflow_data:/mlflow
    depends_on:
      - mlflow
    networks:
      - sentiment_net
    profiles:
      - train
networks:
  sentiment_net:
    driver: bridge
  

volumes:
  mlflow_data:
    driver: local
  postgres_data:
    driver: local
  airflow_logs:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local

